/**
 * The request of GetListOfBinItems()
 */
message GetListOfBinItemsRequest {
	RequestHeader header = 1; // Request header
	GetListOfBinItemsRequestBody body = 2; // Request body
}

/**
 * The response of GetListOfBinItems()
 */
message GetListOfBinItemsResponse {
	ResponseHeader header = 1; // Response header
	GetListOfBinItemsResponseBody body = 2; // Response body
}

/**
 * The body of GetListOfBinItems
 */
message GetListOfBinItemsRequestBody
{
	string bin_relative_path = 1;
	repeated BinItemFlags bin_flags = 2;
	bool only_visible_flag = 3;
	bool only_selected_flag = 4;

	enum BinItemFlags
	{
		AllTypes = 0;
		masterClips = 1;
		linkedMasterClips = 2;
		subclips = 3;
		sequences = 4;
		sources = 5;
		effects = 6;
		motionEffects = 7;
		preCompsRE = 8;
		preCompsTMK = 9;
		groups = 10;
		stereoscopicClips = 11;
	}
}

/**
 * The body of GetListOfBinItems
 */
message GetListOfBinItemsResponseBody
{
	string mob_name = 1; // The message to be returned from the server
	string mob_id = 2;
	bool mob_selected = 3;
}


