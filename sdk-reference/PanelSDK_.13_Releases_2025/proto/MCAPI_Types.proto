/**
 * The request of GetBinColumnInfo()
 */
 message GetBinColumnInfoRequest
 {
	 RequestHeader header = 1; // Request header
	 GetBinColumnInfoRequestBody body = 2; // Request body
 }
 
 /**
  * The body of GetBinColumnInfoRequest
  */
 message GetBinColumnInfoRequestBody
 {
	 string bin_path = 1; // Bin path can be relative to project folder or an absolute path
 }
 
 /**
 * The response of GetBinColumnInfo()
 */
 message GetBinColumnInfoResponse
 {
	 ResponseHeader header = 1; // Response header
	 GetBinColumnInfoResponseBody body = 2; // Response body
 }
 
 /**
  * The body of GetBinColumnInfoResponse
  */
 message GetBinColumnInfoResponseBody
 {
	 repeated BinColumnInfo column = 1; // Contains the information of all bin columns
	 message BinColumnInfo
	 {
		 string column_name = 1; // Bin column name
		 string column_value_type = 2; // The type of the bin column value, such as string, integer, float, etc.
		 bool column_hidden = 3; // True if the bin column is hidden
		 bool column_is_custom = 4; // True if the bin column is user custom column
		 bool column_is_readonly = 5; // True if the bin column cant be modified
	 }
 }
 
/**
 * The request of GetMobInfo
 */
message GetMobInfoRequest
{
	RequestHeader header = 1; // Request header
	GetMobInfoRequestBody body = 2; // Request body
}

/**
 * The body of GetMobInfoRequest. For better performance, 
 * set only_visible_columns to true or includes_empty_columns to false.
 */
message GetMobInfoRequestBody
{
	string mob_id = 1; // SMPTE formatted mob ID string returned from GetMobContent()
	bool only_visible_columns = 2; // True if we only want to include visible columns
	bool includes_empty_columns = 3; // True if we want to also includes empty columns.
}

/**
 * The response of GetMobInfo
 */
message GetMobInfoResponse
{
	ResponseHeader header = 1; // Repsponse header
	GetMobInfoResponseBody body = 2; // The body of GetMobInfoResponse
}

/**
 * Contains the information of a single column
 */
message GetMobInfoResponseBody
{
	string column_name = 1; // Column name
	string column_value = 2; // Column value. For clip color, returned value will be in the format "#RRGGBB"
	string column_value_type = 3; // The type of the column value, such as string, integer, float, etc.
	bool column_hidden = 4; // True if the column is hidden
	bool column_is_custom = 5; // True if the column is user custom column
}

/**
 * The request of SetMobInfo()
 */
message SetMobInfoRequest
{
	RequestHeader header = 1; // Request header
	SetMobInfoRequestBody body = 2; // Request body
}

/**
 * The body of SetMobInfoRequest
 */
message SetMobInfoRequestBody
{
	string mob_id = 1; // SMPTE formatted mob ID strings returned from GetListOfBinItems()
	ColumnInfo column = 2; // The column to be set
}

/**
 * Describes the column info
 */
message ColumnInfo {
	string column_name = 1; // Column name

	// Column value. For columns supported by menu picks, 
	// the English string will be supported. For clip color, use the format "#RRGGBB"
	string column_value = 2; 
}

/**
 * The response of SetMobInfo
 */
message SetMobInfoResponse
{
	ResponseHeader header = 1; // Response header
	SetMobInfoResponseBody body = 2; // The body of SetMobInfoResponse
}

/**
 * Contains the information of a single column
 */
message SetMobInfoResponseBody
{
	repeated MobFailure mob_failure = 1 [deprecated=true];

	// Describes the detail of SetMobInfo failure 
	message MobFailure {
		string mob_id = 1; // SMPTE formatted mob ID strings returned from GetListOfBinItems()
		repeated ColumnInfo failed_columns = 2; // The columns that failed SetMobInfo
	}
}

